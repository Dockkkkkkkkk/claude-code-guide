<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Claude Code 从入门到精通</title>
    <meta
      name="description"
      content="Claude Code 教程文档站，基于仓库中的 Markdown 章节直接发布。"
    />
    <link rel="icon" href="image.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link rel="stylesheet" href="assets/site.css" />
  </head>
  <body>
    <div id="app">文档加载中...</div>
    <script>
      window.$docsify = {
        name: "Claude Code 教程",
        repo: "https://github.com/Dockkkkkkkkk/claude-code-guide",
        homepage:
          "Claude%20Code%20%E4%BB%8E%E5%85%A5%E9%97%A8%E5%88%B0%E7%B2%BE%E9%80%9A%20237e30b475404116b34faf667e8104ab.md",
        loadSidebar: true,
        relativePath: true,
        auto2top: true,
        subMaxLevel: 2,
        search: {
          placeholder: "搜索章节",
          noData: "没有找到相关内容",
          depth: 3,
          hideOtherSidebarContent: true,
          namespace: "claude-code-guide",
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
